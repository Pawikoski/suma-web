/* Mini sparkline placeholder */
const Sparkline = ({color='#6366f1'}) => {
  const pts = [20,35,25,45,30,55,40,35,50,42,60,48,55,65,58];
  const max=Math.max(...pts), min=Math.min(...pts), w=120, h=40;
  const x = (i) => (i/(pts.length-1))*w;
  const y = (v) => h - ((v-min)/(max-min))*(h-4) - 2;
  const d = pts.map((v,i)=>`${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <path d={d+` L${w},${h} L0,${h} Z`} fill={color} opacity={0.12}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2"/>
    </svg>
  );
};

/* Donut chart */
const Donut = ({data, size=120}) => {
  const total = data.reduce((s,d)=>s+d.value,0);
  let angle = -90;
  const r=44, cx=60, cy=60, circ=2*Math.PI*r;
  const slices = data.map(d=>{
    const pct = d.value/total;
    const start = angle;
    angle += pct*360;
    const startR = start*Math.PI/180, endR = angle*Math.PI/180;
    const x1=cx+r*Math.cos(startR), y1=cy+r*Math.sin(startR);
    const x2=cx+r*Math.cos(endR), y2=cy+r*Math.sin(endR);
    const large = pct>0.5?1:0;
    return {...d, d:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`};
  });
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      {slices.map((s,i)=><path key={i} d={s.d} fill={s.color} opacity={0.85}/>)}
      <circle cx={cx} cy={cy} r={30} fill={T.card}/>
    </svg>
  );
};

/* ─── TRANSACTIONS SCREEN ────────────────────── */
function TransactionsScreen({selectedTx, onSelectTx}) {
  const [filter, setFilter] = useState('all');
  const filters = [{id:'all',label:'Wszystkie'},{id:'expense',label:'Wydatki'},{id:'income',label:'Przychody'},{id:'transfer',label:'Transfery'}];
  const filtered = filter==='all' ? TRANSACTIONS : TRANSACTIONS.filter(t=>t.type===filter);

  // Group by date
  const grouped = filtered.reduce((acc,tx)=>{
    if(!acc[tx.date]) acc[tx.date]=[];
    acc[tx.date].push(tx);
    return acc;
  },{});

  const fmtDate = d => {
    const days = {'2026-04-15':'15 kwietnia','2026-04-14':'14 kwietnia','2026-04-13':'13 kwietnia',
      '2026-04-12':'12 kwietnia','2026-04-11':'11 kwietnia','2026-04-10':'10 kwietnia',
      '2026-04-09':'9 kwietnia','2026-04-08':'8 kwietnia','2026-04-07':'7 kwietnia','2026-04-05':'5 kwietnia'};
    return days[d]||d;
  };
  const dayTotal = txs => txs.reduce((s,t)=>s+(t.type==='transfer'?0:t.amount),0);

  return (
    <div style={{display:'flex', height:'calc(100vh - 60px)', overflow:'hidden'}}>
      {/* List */}
      <div style={{flex:1, overflowY:'auto', borderRight:`1px solid ${T.border}`}}>
        {/* Summary strip */}
        <div style={{padding:'14px 20px', background:T.card, borderBottom:`1px solid ${T.border}`, display:'flex', gap:16}}>
          <StatPill label="Przychody kwiecień" amount={1306.54} type="income"/>
          <StatPill label="Wydatki kwiecień" amount={1597.39} type="expense"/>
        </div>

        {/* Filters */}
        <div style={{padding:'12px 20px', background:T.card, borderBottom:`1px solid ${T.border}`, display:'flex', gap:6}}>
          {filters.map(f=>(
            <button key={f.id} onClick={()=>setFilter(f.id)}
              style={{padding:'5px 14px',borderRadius:20,fontSize:13,fontWeight:500,
                background:filter===f.id?T.dark:'transparent',
                color:filter===f.id?'white':T.muted,
                border:`1px solid ${filter===f.id?T.dark:T.border}`,transition:'all .15s'}}>
              {f.label}
            </button>
          ))}
        </div>

        {/* Grouped rows */}
        {Object.entries(grouped).map(([date, txs])=>(
          <div key={date}>
            <div style={{padding:'10px 20px 6px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <span style={{fontSize:12,fontWeight:600,color:T.muted}}>{fmtDate(date)}</span>
              <span style={{fontSize:12,fontWeight:600,color:dayTotal(txs)>=0?T.income:T.expense}}>
                {dayTotal(txs)>=0?'+':''}{fmtPLN(dayTotal(txs))}
              </span>
            </div>
            <Card style={{margin:'0 16px 8px', borderRadius:T.radius, overflow:'hidden'}}>
              {txs.map((tx,i)=>(
                <div key={tx.id} onClick={()=>onSelectTx(tx)}
                  style={{padding:'12px 16px', display:'flex', alignItems:'center', gap:12,
                    background:selectedTx?.id===tx.id?T.accentLight:'transparent',
                    borderBottom:i<txs.length-1?`1px solid ${T.border}`:'none', cursor:'pointer',
                    transition:'background .1s'}}
                  onMouseEnter={e=>{ if(selectedTx?.id!==tx.id) e.currentTarget.style.background=T.bg; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=selectedTx?.id===tx.id?T.accentLight:'transparent'; }}>
                  <div style={{width:38,height:38,borderRadius:10,background:tx.catBg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{tx.catIcon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.dark}}>{tx.cat}</div>
                    <div style={{fontSize:12,color:T.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {tx.desc||tx.loc||''} {tx.loc && tx.desc?`· ${tx.loc}`:''} <span style={{color:T.faint}}>From: {tx.acc}</span>
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:tx.type==='expense'?T.expense:tx.type==='income'?T.income:T.mid}}>
                      {tx.type==='expense'?'-':tx.type==='income'?'+':''}{fmtPLN(Math.abs(tx.amount))}
                    </div>
                    {tx.loc && <div style={{fontSize:11,color:T.faint,display:'flex',alignItems:'center',justifyContent:'flex-end',gap:2}}><Icon n="pin" size={10} color={T.faint}/>{tx.loc}</div>}
                  </div>
                </div>
              ))}
            </Card>
          </div>
        ))}
      </div>

      {/* Detail panel */}
      {selectedTx ? (
        <div style={{width:320, overflowY:'auto', background:T.bg}}>
          <TxDetailPanel tx={selectedTx} onClose={()=>onSelectTx(null)}/>
        </div>
      ) : (
        <div style={{width:320, display:'flex', alignItems:'center', justifyContent:'center', background:T.bg}}>
          <div style={{textAlign:'center', color:T.faint}}>
            <Icon n="receipt" size={36} color={T.faint}/>
            <div style={{fontSize:13, marginTop:10}}>Wybierz transakcję</div>
          </div>
        </div>
      )}
    </div>
  );
}

        <Card style={{padding:20}}>
          <div style={{fontWeight:600,fontSize:14,color:T.dark,marginBottom:16}}>Statystyki konta</div>

            <div style={{padding:14,borderRadius:10,background:T.incomeSoft}}>
              <div style={{fontSize:12,color:T.income,fontWeight:500}}>Przychody</div>
              <div style={{fontSize:20,fontWeight:700,color:T.income}}>+1 306,54 zł</div>
            </div>
            <div style={{padding:14,borderRadius:10,background:T.expenseSoft}}>
              <div style={{fontSize:12,color:T.expense,fontWeight:500}}>Wydatki</div>
              <div style={{fontSize:20,fontWeight:700,color:T.expense}}>-1 597,39 zł</div>
            </div>
            <div style={{padding:14,borderRadius:10,background:T.bg}}>
              <div style={{fontSize:12,color:T.muted,fontWeight:500}}>Bilans</div>
              <div style={{fontSize:20,fontWeight:700,color:T.expense}}>-290,85 zł</div>
            </div>
          </div>
          <div style={{marginTop:16}}>
            <Sparkline color={T.accent}/>
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ─── BUDGET SCREEN ──────────────────────────── */
function BudgetScreen() {
  const total = 4000;
  const spent = CATEGORIES.reduce((s,c)=>s+c.spent,0);
  const pct = spent/total*100;

  return (
    <div style={{padding:24, display:'flex', flexDirection:'column', gap:20}}>
      {/* Overview */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:16}}>
        <Card style={{padding:20, gridColumn:'span 2'}}>
          <div style={{fontSize:13,color:T.muted,fontWeight:500,marginBottom:8}}>Budżet ogólny — Kwiecień 2026</div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:12}}>
            <div>
              <span style={{fontSize:32,fontWeight:800,color:T.dark,letterSpacing:'-1px'}}>{fmtPLN(spent)}</span>
              <span style={{fontSize:15,color:T.muted,fontWeight:400}}> / {fmtPLN(total)}</span>
            </div>
            <span style={{fontSize:20,fontWeight:700,color:pct>100?T.expense:T.accent}}>{Math.round(pct)}%</span>
          </div>
          <Bar pct={pct} color={pct>100?T.expense:T.accent} height={10}/>
          <div style={{display:'flex', justifyContent:'space-between', marginTop:8}}>
            <span style={{fontSize:12,color:T.muted}}>Pozostało: <strong style={{color:T.income}}>{fmtPLN(Math.max(total-spent,0))}</strong></span>
            <span style={{fontSize:12,color:T.muted}}>19 dni do końca miesiąca</span>
          </div>
        </Card>

        <Card style={{padding:20}}>
          <div style={{fontSize:13,color:T.muted,fontWeight:500,marginBottom:12}}>Kategorie w budżecie</div>
          {[{label:'OK', count:CATEGORIES.filter(c=>c.budget&&c.spent/c.budget<=0.8).length, color:T.income},
            {label:'Blisko limitu', count:CATEGORIES.filter(c=>c.budget&&c.spent/c.budget>0.8&&c.spent/c.budget<=1).length, color:T.warn},
            {label:'Przekroczone', count:CATEGORIES.filter(c=>c.budget&&c.spent/c.budget>1).length, color:T.expense},
          ].map(s=>(
            <div key={s.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:s.color}}/>
                <span style={{fontSize:13,color:T.mid}}>{s.label}</span>
              </div>
              <span style={{fontSize:16,fontWeight:700,color:s.color}}>{s.count}</span>
            </div>
          ))}
        </Card>
      </div>

      {/* Category budgets */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
        {CATEGORIES.filter(c=>c.budget).map(c=>{
          const pct = c.spent/c.budget*100;
          const over = pct>100;
          return (
            <Card key={c.id} style={{padding:16}}>
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:10}}>
                <div style={{width:38,height:38,borderRadius:10,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{c.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.dark}}>{c.name}</div>
                  <div style={{fontSize:12,color:T.muted}}>{c.txCount} transakcji</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:14,fontWeight:700,color:over?T.expense:T.dark}}>{fmtPLN(c.spent)}</div>
                  <div style={{fontSize:11,color:T.faint}}>z {fmtPLN(c.budget)}</div>
                </div>
              </div>
              <Bar pct={pct} color={over?T.expense:c.color}/>
              <div style={{display:'flex', justifyContent:'space-between', marginTop:6}}>
                <span style={{fontSize:11,color:over?T.expense:T.muted}}>{over?`Przekroczono o ${fmtPLN(c.spent-c.budget)}`:`Pozostało ${fmtPLN(c.budget-c.spent)}`}</span>
                <span style={{fontSize:11,fontWeight:600,color:over?T.expense:T.accent}}>{Math.round(pct)}%</span>
              </div>
            </Card>
          );
        })}
        {/* Add budget placeholder */}
        <Card style={{padding:16, border:`2px dashed ${T.border}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', minHeight:80}}>
          <div style={{textAlign:'center',color:T.faint}}>
            <Icon n="plus" size={20} color={T.faint}/>
            <div style={{fontSize:12,marginTop:4}}>Dodaj kategorię</div>
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ─── ADD TRANSACTION MODAL ──────────────────── */
function AddTransactionModal({onClose}) {
  const [type, setType] = useState('expense');
  const [amount, setAmount] = useState('0');
  const [cat, setCat] = useState(CATEGORIES[0]);
  const [acc, setAcc] = useState(ACCOUNTS[0]);
  const [note, setNote] = useState('');

  const typeColor = type==='expense'?T.expense:type==='income'?T.income:T.accent;

  const handleNum = (v) => {
    if(v==='⌫') { setAmount(a=>a.length>1?a.slice(0,-1):'0'); return; }
    if(v==='.' && amount.includes('.')) return;
    if(amount==='0' && v!=='.') { setAmount(v); return; }
    if(amount.includes('.')&&amount.split('.')[1]?.length>=2) return;
    setAmount(a=>a+v);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,backdropFilter:'blur(4px)'}}>
      <Card style={{width:480,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.2)',padding:0}}>
        {/* Header */}
        <div style={{padding:'18px 20px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontWeight:700,fontSize:16,color:T.dark}}>Nowa transakcja</div>
          <button onClick={onClose} style={{color:T.muted,padding:4}}><Icon n="x" size={18}/></button>
        </div>

        <div style={{padding:20, display:'flex', flexDirection:'column', gap:16}}>
          {/* Type selector */}
          <div style={{display:'flex',gap:6,background:T.bg,borderRadius:T.radiusSm,padding:4}}>
            {['expense','income','transfer'].map(t=>(
              <button key={t} onClick={()=>setType(t)}
                style={{flex:1,padding:'6px',borderRadius:6,fontSize:13,fontWeight:600,
                  background:type===t?T.card:'transparent',
                  color:type===t?typeColor:T.muted,
                  boxShadow:type===t?'0 1px 4px rgba(0,0,0,.1)':'none',
                  transition:'all .15s'}}>
                {t==='expense'?'Wydatek':t==='income'?'Przychód':'Transfer'}
              </button>
            ))}
          </div>

          {/* Amount display */}
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{fontSize:48,fontWeight:800,color:typeColor,letterSpacing:'-2px',lineHeight:1}}>{amount}</div>
            <div style={{fontSize:16,color:T.muted,marginTop:4}}>PLN</div>
          </div>

          {/* Account & Category */}
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8,alignItems:'center'}}>
            <div style={{background:T.incomeSoft,borderRadius:10,padding:'10px 12px',cursor:'pointer'}}>
              <div style={{fontSize:10,color:T.muted,fontWeight:500,marginBottom:2}}>Konto</div>
              <div style={{fontSize:13,fontWeight:700,color:T.dark}}>{acc.icon} {acc.name}</div>
              <div style={{fontSize:11,color:T.muted}}>{fmtPLN(acc.balance)}</div>
            </div>
            <div style={{width:30,height:30,borderRadius:'50%',background:T.expenseSoft,display:'flex',alignItems:'center',justifyContent:'center',color:T.expense,fontSize:16}}>→</div>
            <div style={{background:T.accentLight,borderRadius:10,padding:'10px 12px',cursor:'pointer'}}>
              <div style={{fontSize:10,color:T.muted,fontWeight:500,marginBottom:2}}>Kategoria</div>
              <div style={{fontSize:13,fontWeight:700,color:T.dark}}>{cat.icon} {cat.name}</div>
              <div style={{fontSize:11,color:T.muted}}>{fmtPLN(cat.spent)} zł</div>
            </div>
          </div>

          {/* Note */}
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Dodaj notatkę..."
            style={{padding:'10px 14px',borderRadius:T.radiusSm,border:`1px solid ${T.border}`,fontSize:13,color:T.dark,outline:'none',fontFamily:'inherit'}}/>

          {/* Numpad */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {['7','8','9','⌫','4','5','6','↺','1','2','3',null,'PLN','0','.','✓'].map((k,i)=>{
              if(k===null) return <div key={i}/>;
              const isConfirm = k==='✓';
              const isSpecial = k==='PLN'||k==='⌫'||k==='↺';
              return (
                <button key={k} onClick={()=>k==='✓'?onClose():handleNum(k)}
                  style={{padding:'14px 0',borderRadius:T.radiusSm,fontSize:isConfirm?20:15,fontWeight:600,
                    background:isConfirm?T.accent:isSpecial?T.bg:T.bg,
                    color:isConfirm?'white':isSpecial?T.muted:T.dark,
                    border:`1px solid ${isConfirm?T.accent:T.border}`,
                    gridRow:isConfirm?'span 2':'auto'}}>
                  {k}
                </button>
              );
            })}
          </div>
        </div>
      </Card>
    </div>
  );
}

/* ─── TWEAKS PANEL ───────────────────────────── */

  "accentColor": "#6366f1",
  "compactSidebar": false,
  "showAIInsights": true
}/*EDITMODE-END*/;

    <div style={{position:'fixed',bottom:20,right:20,zIndex:300,background:T.card,borderRadius:T.radius,

      <div style={{fontWeight:700,fontSize:13,color:T.dark,marginBottom:12}}>Tweaks</div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <label style={{fontSize:12,color:T.muted,fontWeight:500}}>
          Kolor akcentu
          <div style={{display:'flex',gap:6,marginTop:6}}>
            {['#6366f1','#8b5cf6','#ec4899','#10b981','#f59e0b'].map(c=>(
              <button key={c} onClick={()=>setTweaks(t=>({...t,accentColor:c}))}
                style={{width:22,height:22,borderRadius:'50%',background:c,border:tweaks.accentColor===c?`2px solid ${T.dark}`:'2px solid transparent'}}/>
            ))}
          </div>
        </label>
        <label style={{fontSize:12,color:T.muted,fontWeight:500,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          Insighty AI
          <button onClick={()=>setTweaks(t=>({...t,showAIInsights:!t.showAIInsights}))}
            style={{width:36,height:20,borderRadius:10,background:tweaks.showAIInsights?T.accent:T.border,
              position:'relative',transition:'background .2s'}}>

/* ─── APP ────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('home');
  const [selectedTx, setSelectedTx] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  const MONTHS_LIST = ['Styczeń 2026','Luty 2026','Marzec 2026','Kwiecień 2026'];
  const [monthIdx, setMonthIdx] = useState(3);

  const handleSelectTx = (tx) => {
    setSelectedTx(tx);
    if(screen!=='transactions') setScreen('transactions');
  };

  // Tweaks protocol
  useEffect(()=>{
    const handler = (e) => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const screenTitles = {
    home:'Home', transactions:'Transakcje', categories:'Kategorie',
    accounts:'Konta', budget:'Budżet'
  };

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar active={screen} onNav={(s)=>{setScreen(s);setSelectedTx(null);}} onAdd={()=>setShowAdd(true)}/>

      {/* Main */}
      <div style={{flex:1, marginLeft:T.sidebarW, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <Topbar
          title={screenTitles[screen]}
          month={MONTHS_LIST[monthIdx]}
          onPrev={()=>setMonthIdx(i=>Math.max(0,i-1))}
          onNext={()=>setMonthIdx(i=>Math.min(MONTHS_LIST.length-1,i+1))}
        />
        <div style={{flex:1, overflowY: screen==='transactions'?'hidden':'auto', background:T.bg}}>
          {screen==='home'       && <HomeScreen onNav={setScreen} onSelectTx={handleSelectTx}/>}
          {screen==='transactions'&&<TransactionsScreen selectedTx={selectedTx} onSelectTx={setSelectedTx}/>}
          {screen==='categories' && <CategoriesScreen/>}
          {screen==='accounts'   && <AccountsScreen onSelectTx={handleSelectTx}/>}
          {screen==='budget'     && <BudgetScreen/>}
        </div>
      </div>

      {showAdd && <AddTransactionModal onClose={()=>setShowAdd(false)}/>}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
